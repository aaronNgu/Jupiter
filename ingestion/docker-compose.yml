services:
  db:
    image: postgres:16        # pin to the RDS major version
    environment: { POSTGRES_PASSWORD: dev }
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
  createbucket:                # one-shot: MinIO has no bucket until created
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio:9000 minioadmin minioadmin;
      do sleep 1; done
      && mc mb --ignore-existing local/luminque-dev"
volumes:
  pgdata:
  miniodata:
