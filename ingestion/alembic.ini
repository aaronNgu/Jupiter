# CLI convenience only (e.g. `uv run alembic revision`). The app applies
# migrations itself at startup — see luminque_ingestion/migrations.py.
# The database URL comes from the DATABASE_URL env var (see env.py).

[alembic]
script_location = luminque_ingestion:alembic

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
